<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Apply the saved theme before first paint so the page doesn't flash the
      // default dark theme before flipping to a chosen light/neon theme.
      (function () {
        try {
          var t = localStorage.getItem('element08.theme');
          if (t === 'light') document.documentElement.classList.add('light');
          else if (t === 'neon') document.documentElement.classList.add('neon');
          else if (t === 'sky') document.documentElement.classList.add('sky');
        } catch (e) {
          /* localStorage blocked — stay on the default */
        }
      })();
    </script>
    <meta
      name="description"
      content="ELEMENT | 08 Coach: build freediving training plans and hand them to your athletes as a file. No account needed."
    />
    <title>ELEMENT | 08 Coach</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
