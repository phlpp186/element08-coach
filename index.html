<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Resolve the theme before first paint so the page doesn't flash the
      // wrong palette. An explicit choice ('light' = Caribbean, 'mid' = Misty,
      // 'dark' = Chalk Dark) persists in localStorage; anything else —
      // including the retired 'neon'/'sky' values — counts as no preference,
      // and the OS color scheme decides light/dark.
      (function () {
        var t = null;
        try {
          t = localStorage.getItem('element08.theme');
        } catch (e) {
          /* localStorage blocked — fall through to the OS preference */
        }
        if (t !== 'light' && t !== 'mid' && t !== 'dark') {
          try {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } catch (e) {
            t = 'light';
          }
        }
        if (t === 'light') document.documentElement.classList.add('light');
        else if (t === 'mid') document.documentElement.classList.add('mid');
      })();
    </script>
    <meta
      name="description"
      content="ELEMENT | 08 Coach: build freediving training plans and hand them to your athletes as a file. No account needed."
    />
    <title>ELEMENT | 08 Coach</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
